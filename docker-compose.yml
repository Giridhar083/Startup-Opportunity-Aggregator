services:

  web:
    build: .
    container_name: launchpad_web
    command: python -u app.py
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./exports:/app/exports
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000')"]
      interval: 30s
      timeout: 10s
      retries: 3

  scheduler:
    build: .
    container_name: launchpad_scheduler
    command: python -u scheduler_job.py
    volumes:
      - ./data:/app/data
      - ./exports:/app/exports
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    restart: unless-stopped